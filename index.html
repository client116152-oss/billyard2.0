        * {

            margin: 0;

        body {

        #app {

        button.primary {
            background-color: #2e7d32;

        }

            margin-bottom: 8px;

        async function loadProfileScreen() {
            document.getElementById('profile-username').textContent = `Привет, ${currentUser.username}!`;
            
            const { data: games, error } = await supabaseClient
                .from('games')
                .select('*')
                .or(`player1_id.eq.${currentUser.id},player2_id.eq.${currentUser.id}`)
                .order('created_at', { ascending: true });
            
            if (error) console.error('Ошибка загрузки списка игр:', error);
            
            renderGamesList(games || []);
            renderOverallEfficiencyChart(games || []);
            showScreen('profile-screen');

        function renderGamesList(games) {
            const container = document.getElementById('games-list');
            if (games.length === 0) {
                container.innerHTML = '<p style="color:#8bc34a;">У вас пока нет игр.</p>';
                return;
            }
            let html = '';
            const reversed = [...games].reverse();
            reversed.forEach(game => {
                const date = new Date(game.created_at).toLocaleDateString();
                const opponent = game.player1_id === currentUser.id ? game.player2_name : game.player1_name;
                const myWins = game.player1_id === currentUser.id ? game.match_wins_p1 : game.match_wins_p2;
                const oppWins = game.player1_id === currentUser.id ? game.match_wins_p2 : game.match_wins_p1;
                
                // Расчет результативности текущего игрока в этой игре
                const stats = game.player1_id === currentUser.id ? game.total_stats_p1 : game.total_stats_p2;
                let efficiency = '0%';
                if (stats) {
                    const totalShots = (stats.break?.shots ||0) + (stats.own?.shots||0) + (stats.opponent?.shots||0) + (stats.random?.shots||0) + (stats.otygrysh?.shots||0) + (stats.shtraf?.shots||0);
                    const totalMade = (stats.break?.made||0) + (stats.own?.made||0) + (stats.opponent?.made||0) + (stats.random?.made||0) + (stats.otygrysh?.made||0);
                    efficiency = totalShots > 0 ? ((totalMade / totalShots) * 100).toFixed(1) + '%' : '0%';
                }
                
                html += `
                    <div class="game-list-item" data-game-id="${game.id}">
                        <div class="date">${date}</div>
                        <div class="players">соперник: ${opponent}</div>
                        <div class="score">${myWins}:${oppWins} (${efficiency})</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            document.querySelectorAll('.game-list-item').forEach(el => {
                el.addEventListener('click', () => loadGameDetail(el.dataset.gameId));
            });
        }

        function renderOverallEfficiencyChart(games) {
            const ctx = document.getElementById('overall-efficiency-chart').getContext('2d');
            if (chartOverall) chartOverall.destroy();

            const labels = games.map((_, i) => `Игра ${i+1}`);
            const data = games.map(game => {
                const stats = game.player1_id === currentUser.id ? game.total_stats_p1 : game.total_stats_p2;
                if (!stats) return 0;
                const totalShots = (stats.break?.shots ||0) + (stats.own?.shots||0) + (stats.opponent?.shots||0) + (stats.random?.shots||0) + (stats.otygrysh?.shots||0) + (stats.shtraf?.shots||0);
                const totalMade = (stats.break?.made||0) + (stats.own?.made||0) + (stats.opponent?.made||0) + (stats.random?.made||0) + (stats.otygrysh?.made||0);
                return totalShots > 0 ? (totalMade / totalShots * 100).toFixed(1) : 0;
            });

            chartOverall = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: 'Общая результативность (%)', data, borderColor: '#4caf50', backgroundColor: '#2e7d3250', tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
            });
